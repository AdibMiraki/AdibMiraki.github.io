  <!-- Vignette overlay -->
  <rect width="900" height="220" fill="url(#vignette)"/>

  <!-- Name text -->
  <text
    x="450" y="102"
    font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
    font-size="40"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="5"
    filter="url(#nameglow)"
    style="animation: pulse 3.5s ease-in-out infinite"
  >ADIB MIRAKI FERIZ</text>

  <!-- Subtitle -->
  <text
    x="450" y="138"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13.5"
    font-style="italic"
    fill="#7dd3f8"
    text-anchor="middle"
    letter-spacing="2.5"
    opacity="0.88"
